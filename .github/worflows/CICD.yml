name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet de déclencher manuellement depuis l'UI GitHub

permissions:
  contents: write # Nécessaire pour pousser sur gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      #  1. Checkout 
      - name: Checkout
        uses: actions/checkout@v4

      #  2. Toolchain Rust + cible WASM 
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown   # cible obligatoire pour Dioxus web
          components: rustfmt, clippy

      #  3. Cache Cargo (registry + git + target) 
      # Évite de re-télécharger et re-compiler les dépendances à chaque run.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      #  4. Installation de dioxus-cli 
      # --locked garantit d'utiliser exactement les versions du Cargo.lock de dx,
      # évitant les surprises liées à une mise à jour silencieuse.
      - name: Install dioxus-cli
        run: cargo install dioxus-cli --locked

      #  5. Nettoyage du build précédent 
      - name: Clean previous build
        run: rm -rf docs/

      #  6. Build Dioxus 
      # --base-path DOIT correspondre au sous-chemin GitHub Pages du dépôt,
      # i.e. "https://user.github.io/<REPO_NAME>/".
      # On l'injecte dynamiquement depuis le contexte GitHub Actions.
      - name: Build Dioxus app
        working-directory: app
        env:
          # Récupère automatiquement le nom du dépôt (ex: "wAIves")
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          dx bundle \
            --release \
            --platform web \
            --out-dir ../docs \
            --base-path /$REPO_NAME

      #  7. Normalisation de la sortie 
      # Selon la version de dioxus-cli, le build peut atterrir dans docs/public/.
      # On remonte le contenu à la racine de docs/ si c'est le cas.
      - name: Flatten docs/public if present
        run: |
          if [ -d docs/public ] && [ "$(ls -A docs/public)" ]; then
            cp -rn docs/public/. docs/
            rm -rf docs/public
          fi

      #  8. .nojekyll 
      # CRITIQUE : sans ce fichier, GitHub Pages (Jekyll) ignore tous les dossiers
      # commençant par "_" et refuse de servir les fichiers .wasm avec le bon
      # Content-Type (application/wasm). Le WASM ne fonctionnera pas sans ça.
      - name: Add .nojekyll
        run: touch docs/.nojekyll

      #  9. Fallback SPA (404 → index.html) 
      # GitHub Pages sert 404.html quand un chemin est introuvable.
      # En copiant index.html → 404.html, le router Dioxus/WASM peut reprendre
      # la main et gérer le routage côté client (deep links, rechargements, etc.)
      - name: Create 404.html fallback for SPA routing
        run: cp docs/index.html docs/404.html

      #  10. Vérification des chemins dans index.html (debug) 
      # Affiché uniquement dans les logs CI, ne bloque pas le déploiement.
      - name: Show generated index.html (debug)
        run: cat docs/index.html

      #  11. Déploiement sur GitHub Pages 
      # Pousse le contenu de ./docs sur la branche gh-pages (orphan = historique
      # propre, pas de pollution du dépôt principal).
      # GitHub Pages doit être configuré sur : "Branch: gh-pages / root (/)".
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true          # 1 seul commit sur gh-pages, pas d'historique inutile
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: ${{ github.sha }}"